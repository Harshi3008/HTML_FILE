<h2>My Issued Books</h2>
<table border="1">
    <tr>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Penalty</th>
        <th>Actions</th>
    </tr>
    {% for issue in issues %}
    <tr>
        <td>{{ issue.book.title }}</td>
        <td>{{ issue.issue_date }}</td>
        <td>{{ issue.due_date }}</td>
        <td>₹{{ issue.penalty }}</td>
        <td>
            {% if issue.penalty > 0 %}
                <span style="color:red;">Pay Penalty First</span>
            {% else %}
                <a href="{% url 'reissue_book' issue.id %}">Reissue</a>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
