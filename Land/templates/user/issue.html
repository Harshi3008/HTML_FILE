<!DOCTYPE html>
<html lang="en">

<head>
  {% load static %}
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Book</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

<body>
    <div class="page-container">
        <div class="main-content">
        <div class="container mt-5">
            <h2>Issue a Book</h2>
            <form method="POST" class="mt-3">
                {% csrf_token %}
                <input type="hidden" name="form_type" value="manual_issue">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="manual_book_id" class="form-label">Book</label>
                        <select name="book_id" id="manual_book_id" class="form-select" required>
                            <option value="">Choose a book</option>
                            {% for book in data %}
                            <option value="{{ book.id }}">{{ book.title }} by {{ book.author }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="issue_date" class="form-label">Issue Date</label>
                        <input type="date" name="issue_date" id="issue_date" class="form-control" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="return_date" class="form-label">Return Date (15 days after issue date)</label>
                        <input type="date" name="return_date" id="return_date" class="form-control" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="datestart" class="form-label">Start DateTime</label>
                        <input type="datetime-local" name="datestart" id="datestart" class="form-control" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_returned" id="is_returned">
                            <label class="form-check-label" for="is_returned">
                                Is Returned
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="reissued" id="reissued">
                            <label class="form-check-label" for="reissued">
                                Reissued
                            </label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">Create Manual Issue</button>
            </form>
        </div>
    </div>
    <div class="clearfix"></div>
</div>
		<script>
			var toggle = true;

			$(".sidebar-icon").click(function () {
				if (toggle) {
					$(".page-container").addClass("sidebar-collapsed").removeClass("sidebar-collapsed-back");
					$("#menu span").css({ "position": "absolute" });
				}
				else {
					$(".page-container").removeClass("sidebar-collapsed").addClass("sidebar-collapsed-back");
					setTimeout(function () {
						$("#menu span").css({ "position": "relative" });
					}, 400);
				}

				toggle = !toggle;
			});

			// Function to format date as YYYY-MM-DD
			function formatDate(date) {
				var d = new Date(date),
					month = '' + (d.getMonth() + 1),
					day = '' + d.getDate(),
					year = d.getFullYear();

				if (month.length < 2)
					month = '0' + month;
				if (day.length < 2)
					day = '0' + day;

				return [year, month, day].join('-');
			}

			// Function to format datetime as YYYY-MM-DDTHH:MM
			function formatDateTime(date) {
				var d = new Date(date),
					month = '' + (d.getMonth() + 1),
					day = '' + d.getDate(),
					year = d.getFullYear(),
					hours = '' + d.getHours(),
					minutes = '' + d.getMinutes();

				if (month.length < 2)
					month = '0' + month;
				if (day.length < 2)
					day = '0' + day;
				if (hours.length < 2)
					hours = '0' + hours;
				if (minutes.length < 2)
					minutes = '0' + minutes;

				return [year, month, day].join('-') + 'T' + [hours, minutes].join(':');
			}

			// Set current date and calculate return date on page load
			document.addEventListener('DOMContentLoaded', function() {
				var today = new Date();
				var returnDate = new Date();
				returnDate.setDate(today.getDate() + 15);

				document.getElementById('issue_date').value = formatDate(today);
				document.getElementById('return_date').value = formatDate(returnDate);
				document.getElementById('datestart').value = formatDateTime(today);
			});

			// Update return date when issue date changes
			document.getElementById('issue_date').addEventListener('change', function() {
				var issueDate = new Date(this.value);
				var returnDate = new Date(issueDate);
				returnDate.setDate(issueDate.getDate() + 15);
				document.getElementById('return_date').value = formatDate(returnDate);
			});
		</script>
		<!--js -->
		<script src="{% static 'admin/js/jquery.nicescroll.js' %}"></script>
<script src="{% static 'admin/js/scripts.js' %}"></script>
<!-- Bootstrap Core JavaScript -->
<script src="{% static 'admin/js/bootstrap.min.js' %}"></script>
<!-- /Bootstrap Core JavaScript -->	   

</body>

</html>
