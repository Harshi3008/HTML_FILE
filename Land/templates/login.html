<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Login - Scan to Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        #qr-reader {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 30px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        #qr-reader video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1em;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.5);
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid rgba(244, 67, 54, 0.5);
        }
        
        .manual-login {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .manual-login a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        
        .manual-login a:hover {
            opacity: 1;
        }
        
        .permission-denied {
            background: rgba(244, 67, 54, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code Login</h1>
        <p class="subtitle">Position your QR code in the camera view</p>
        
        <div id="qr-reader"></div>
        
        <div id="status" class="status" style="display: none;"></div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Initializing camera...</p>
        </div>
        
        <div class="manual-login">
            <a href="login">Login with username/password instead</a>
        </div>
    </div>

    <!-- Include the html5-qrcode library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <script>
        let html5QrCode = null;
        
        // Function to handle successful QR scan
        function onScanSuccess(decodedText, decodedResult) {
            console.log("QR Code scanned:", decodedText);
            
            // Show success message
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.className = 'status success';
            statusDiv.innerHTML = 'QR Code detected! Logging you in...';
            
            // Send the QR code data to the server for verification
            fetch('login-qr', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ qrData: decodedText })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    statusDiv.innerHTML = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'user-dashboard';
                    }, 1500);
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = 'Invalid QR code. Please try again.';
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                        startScanner(); // Restart scanner
                    }, 3000);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                statusDiv.className = 'status error';
                statusDiv.innerHTML = 'Error processing QR code. Please try again.';
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                    startScanner(); // Restart scanner
                }, 3000);
            });
        }
        
        // Function to handle scan failure
        function onScanFailure(error) {
            // Handle scan failure, usually better to ignore and keep scanning
            console.warn("Scan error:", error);
        }
        
        // Function to get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // Function to start the QR scanner
        function startScanner() {
            const loadingDiv = document.getElementById('loading');
            loadingDiv.style.display = 'none';
            
            html5QrCode = new Html5Qrcode("qr-reader");
            
            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                disableFlip: false
            };
            
            Html5Qrcode.getCameras().then(cameras => {
                if (cameras && cameras.length) {
                    let cameraId = cameras[0].id;
                    // Prefer back camera if available
                    const backCamera = cameras.find(camera => 
                        camera.label.toLowerCase().includes('back') || 
                        camera.label.toLowerCase().includes('rear')
                    );
                    if (backCamera) {
                        cameraId = backCamera.id;
                    }
                    
                    html5QrCode.start(
                        cameraId,
                        config,
                        onScanSuccess,
                        onScanFailure
                    ).catch(err => {
                        console.error("Error starting scanner:", err);
                        loadingDiv.innerHTML = `
                            <div class="permission-denied">
                                <p>Camera access denied or not available.</p>
                                <p>Please ensure:</p>
                                <ul style="text-align: left;">
                                    <li>Camera permissions are granted</li>
                                    <li>You're using HTTPS or localhost</li>
                                    <li>No other app is using the camera</li>
                                </ul>
                            </div>
                        `;
                    });
                } else {
                    loadingDiv.innerHTML = '<p>No cameras found on this device.</p>';
                }
            }).catch(err => {
                console.error("Error accessing cameras:", err);
                loadingDiv.innerHTML = '<p>Error accessing camera. Please check permissions.</p>';
            });
        }
        
        // Function to stop the scanner
        function stopCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    console.log("Scanner stopped");
                    const loadingDiv = document.getElementById('loading');
                    loadingDiv.style.display = 'flex';
                    loadingDiv.innerHTML = '<p>Camera stopped. Click "Start Camera" to resume.</p>';
                }).catch(err => {
                    console.error("Error stopping scanner:", err);
                });
            }
        }
        
        // Start camera automatically when page loads
        window.addEventListener('load', function() {
            setTimeout(startScanner, 500); // Small delay to ensure DOM is ready
        });
        
        // Handle page visibility changes
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopCamera();
            } else {
                setTimeout(startScanner, 500);
            }
        });
    </script>
</body>
</html>
