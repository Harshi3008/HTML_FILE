<!DOCTYPE html>
<html>
<head>
  <title>QR Login</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; }
    #reader { width: 350px; margin: auto; }
    #result { margin-top: 15px; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Login with QR Code</h2>
  <div id="reader"></div>
  <p id="result">Scanning...</p>

  <script>
    // Function called when QR is successfully scanned
    function onScanSuccess(decodedText) {
      document.getElementById("result").innerText = "Scanned: " + decodedText;

      // Send scanned QR data to Django for verification
      fetch("/login-qr/", {
        method: "POST",
        headers: { 
          "Content-Type": "application/json", 
          "X-CSRFToken": getCookie("csrftoken") 
        },
        body: JSON.stringify({ qrData: decodedText })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          window.location.href = "/dashboard/";  // redirect on success
        } else {
          document.getElementById("result").innerText = "Invalid QR Code ❌";
        }
      });
    }

    // Handle scan failure (optional)
    function onScanFailure(error) {
      console.warn(QR error: ${error});
    }

    // Start the camera scanner automatically
    let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    scanner.render(onScanSuccess, onScanFailure);

    // Helper function to get CSRF token
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + "=")) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
  </script>
</body>
</html>
