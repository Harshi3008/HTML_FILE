<!DOCTYPE HTML>
<html>
<head>
	{% load static %}
	<title></title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<script
		type="application/x-javascript"> addEventListener("load", function() { setTimeout(hideURLbar, 0); }, false); function hideURLbar(){ window.scrollTo(0,1); } </script>
	<!-- Bootstrap Core CSS -->
	<link href="{% static 'admin/css/bootstrap.min.css' %}" rel='stylesheet' type='text/css' />
	<!-- Custom CSS -->
	<link href="{% static 'admin/css/style.css' %}" rel='stylesheet' type='text/css' />
	<link rel="stylesheet" href="{% static 'admin/css/morris.css' %}" type="text/css" />
	<!-- Graph CSS -->
	<link href="{% static 'admin/css/font-awesome.css' %}" rel="stylesheet">
	<!-- jQuery -->
	<script src="{% static 'admin/js/jquery-2.1.4.min.js' %}"></script>
	<!-- //jQuery -->
	<link href='//fonts.googleapis.com/css?family=Roboto:700,500,300,100italic,100,400' rel='stylesheet'
		type='text/css' />
	<link href='//fonts.googleapis.com/css?family=Montserrat:400,700' rel='stylesheet' type='text/css'>
	<!-- lined-icons -->
	<link rel="stylesheet" href="{% static 'admin/css/icon-font.min.css' %}" type='text/css' />
	<!-- //lined-icons -->
	<style>
		.card .card-header img{
			height:200px;
		}
		.topbar {
      background-color: #472c0d; /* dark wine red */
      color: white;
      font-size: 0.9rem;
      padding: 0.4rem 10px;
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .topbar a {
      color: #fff;
      text-transform: uppercase;
      font-weight: 00;
      border-right: 1px solid rgba(255, 255, 255, 0.4);
      padding-right: 0.7rem;
      transition: color 0.3s ease;
    }
    .topbar a:last-child {
      border-right: none;
      padding-right: 0;
    }
    .topbar a:hover {
      color: #ff8888;
    }

    /* Navigation */
    nav {
      margin-top: 8px;
      margin-bottom: 32px;
      text-align: center;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
    }
    nav a {
      color: #222;
      margin: 0 12px;
      padding: 10px 8px;
      position: relative;
      transition: color 0.3s ease;
    }
    nav a:hover,
    nav a:focus {
      color: #472c0d;
    }

	</style>

</head>
<body>
	 <div class="topbar">
      <a href="{% url 'membership' %}" tabindex="0">Membership</a>
      <a href="{% url 'contributions' %}" tabindex="0">Contributions</a>
      <a href="{% url 'issue book' %}" tabindex="0">Issue Books</a>
      <a href="{% url 'contact' %}" tabindex="0">Contact</a>
    </div>


    <nav aria-label="Primary navigation">
      <a href="{% url 'index'%}" tabindex="0">Home</a>
      <a href="{% url 'book' %}" tabindex="0">Books</a>
      <a href="{% url 'events' %}" tabindex="0">Events</a>
      <a href="{% url 'about' %}" tabindex="0">About</a>
      <a href="{% url 'contact' %}" tabindex="0">Contact</a>
    </nav>
    <hr>
    <h1 class="head fw-bold fs-1 text-center">Books</h1>
  <main class="container" role="main" aria-label="Book page">
    <header class="header">
       
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a> &gt; <span aria-current="page">Book</span>
      </nav>

    </header>

			<!--heder end here-->
			
			<div class="row"></div>
			{% for i in data %}
			<div class="col-lg-3 col-sm-12">
				<div class="card">
					<div class="card-header">
						<img src="{{i.image.url}}" class="d-block w-100 img" alt="">
					</div>
					<div class="card-body">
						<h3>{{i.product_name}}</h3>
						<p>{{i.price}}</p>
					</div>
					<div class="card-footer">
						<a href="" class="btn btn-info">Buy</a>
					</div>
				</div>
			</div>


			</tr>
			{% endfor %}
		</div>





		<!-- script-for sticky-nav -->
		<script>
			$(document).ready(function () {
				var navoffeset = $(".header-main").offset().top;
				$(window).scroll(function () {
					var scrollpos = $(window).scrollTop();
					if (scrollpos >= navoffeset) {
						$(".header-main").addClass("fixed");
					} else {
						$(".header-main").removeClass("fixed");
					}
				});

			});
		</script>
	

							<script>
		var toggle = true;

		$(".sidebar-icon").click(function () {
			if (toggle) {
				$(".page-container").addClass("sidebar-collapsed").removeClass("sidebar-collapsed-back");
				$("#menu span").css({ "position": "absolute" });
			}
			else {
				$(".page-container").removeClass("sidebar-collapsed").addClass("sidebar-collapsed-back");
				setTimeout(function () {
					$("#menu span").css({ "position": "relative" });
				}, 400);
			}

			toggle = !toggle;
		});
	</script>
	<!--js -->
	<script src="{% static 'admin/js/jquery.nicescroll.js' %}"></script>
	<script src="{% static 'admin/js/scripts.js' %}"></script>
	<!-- Bootstrap Core JavaScript -->
	<script src="{% static 'admin/js/bootstrap.min.js' %}"></script>
	<!-- /Bootstrap Core JavaScript -->

	</body>

</html>
